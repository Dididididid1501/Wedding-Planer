<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Свадебный менеджер</title>
    <!-- Основные стили -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <!-- Стили секций -->
    <link rel="stylesheet" href="css/sections/tasks.css">
    <link rel="stylesheet" href="css/sections/budget.css">
    <link rel="stylesheet" href="css/sections/guests.css">
    <link rel="stylesheet" href="css/sections/seating.css">
    <link rel="stylesheet" href="css/sections/projects.css">
    <!-- Шрифты и иконки -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<!-- ==================== РАБОЧИЙ СТОЛ (СПИСОК ПРОЕКТОВ) ==================== -->
<div id="projectsContainer" style="display: none;"></div>

<!-- ==================== ОСНОВНОЙ ИНТЕРФЕЙС (АКТИВНЫЙ ПРОЕКТ) ==================== -->
<div id="appContainer" style="display: none;">
    <!-- Хедер с информацией о проекте и кнопкой смены -->
    <!-- Хедер с информацией о проекте и кнопкой смены -->
<div class="app-header">
    <div class="project-info">
        <i class="fas fa-home" style="color: #3390ec; font-size: 1.2rem;"></i>
        <span id="currentProjectName">Свадьба Марии и Дениса</span>
    </div>
    <button class="btn-tg btn-outline-tg" id="switchProjectBtn"><i class="fas fa-th"></i> Все проекты</button>
</div>
    <!-- СЕКЦИЯ: ПЛАН ПОДГОТОВКИ -->
    <div class="tg-container" id="tasksContainer">
        <div class="tg-header" data-section="tasks">
            <div class="tg-title">
                <i class="fas fa-tasks"></i>
                <h1>План подготовки</h1>
                <span class="section-summary" id="tasksSummary"></span>
            </div>
            <div style="display: flex; align-items: center; gap: 12px;">
                <div class="tg-badge" id="tasksProgressBadge">Выполнено: 0%</div>
                <i class="fas fa-chevron-down collapse-icon"></i>
            </div>
        </div>
        <div class="section-content"></div>
    </div>

    <!-- СЕКЦИЯ: БЮДЖЕТ -->
    <div class="tg-container collapsed" id="expensesContainer">
        <div class="tg-header" data-section="expenses">
            <div class="tg-title">
                <i class="fas fa-calendar-check"></i>
                <h1>Свадебный бюджет</h1>
                <span class="section-summary" id="expensesSummary"></span>
            </div>
            <div style="display: flex; align-items: center; gap: 12px;">
                <div class="tg-badge">Ответственные</div>
                <i class="fas fa-chevron-down collapse-icon"></i>
            </div>
        </div>
        <div class="section-content"></div>
    </div>

    <!-- СЕКЦИЯ: ГОСТИ -->
    <div class="tg-container collapsed" id="guestsContainer">
        <div class="tg-header" data-section="guests">
            <div class="tg-title">
                <i class="fas fa-users"></i>
                <h1>Список гостей</h1>
                <span class="section-summary" id="guestsSummary"></span>
            </div>
            <div style="display: flex; align-items: center; gap: 12px;">
                <div class="tg-badge" id="totalGuestsBadge">Всего: 0</div>
                <i class="fas fa-chevron-down collapse-icon"></i>
            </div>
        </div>
        <div class="section-content"></div>
    </div>

    <!-- СЕКЦИЯ: РАССАДКА -->
    <div class="tg-container collapsed" id="seatingContainer">
        <div class="tg-header" data-section="seating">
            <div class="tg-title">
                <i class="fas fa-chair"></i>
                <h1>План рассадки</h1>
                <span class="section-summary" id="seatingSummary"></span>
            </div>
            <div style="display: flex; align-items: center; gap: 12px;">
                <div class="tg-badge" id="unseatedBadge"></div>
                <i class="fas fa-chevron-down collapse-icon"></i>
            </div>
        </div>
        <div class="section-content"></div>
    </div>
</div>

<!-- Модальные окна (без изменений) -->
<div id="editTaskModal" class="modal">...</div>
<div id="manageCategoriesModal" class="modal">...</div>
<div id="editGuestModal" class="modal">...</div>
<div id="editExpenseModal" class="modal">...</div>
<div id="tableSettingsModal" class="modal">...</div>
<div id="changeTableModal" class="modal">...</div>
<div id="confirmDeleteModal" class="modal">...</div>

<!-- Основной скрипт приложения -->
<script type="module" src="js/app.js"></script>
</body>
</html>
