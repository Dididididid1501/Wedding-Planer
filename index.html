<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Свадебный менеджер · Задачи · Бюджет · Гости · Рассадка</title>
    <!-- Стили -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/sections/tasks.css">
    <link rel="stylesheet" href="css/sections/budget.css">
    <link rel="stylesheet" href="css/sections/guests.css">
    <link rel="stylesheet" href="css/sections/seating.css">
    <!-- Шрифты и иконки -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<!-- ==================== СЕКЦИЯ: ПЛАН ПОДГОТОВКИ ==================== -->
<div class="tg-container" id="tasksContainer">
    <div class="tg-header" data-section="tasks">
        <div class="tg-title">
            <i class="fas fa-tasks"></i>
            <h1>План подготовки</h1>
            <span class="section-summary" id="tasksSummary"></span>
        </div>
        <div style="display: flex; align-items: center; gap: 12px;">
            <div class="tg-badge" id="tasksProgressBadge">Выполнено: 0%</div>
            <i class="fas fa-chevron-down collapse-icon"></i>
        </div>
    </div>
    <div class="section-content">
        <!-- Динамический контент рендерится модулем tasks -->
    </div>
</div>

<!-- ==================== СЕКЦИЯ: БЮДЖЕТ ==================== -->
<div class="tg-container collapsed" id="expensesContainer">
    <div class="tg-header" data-section="expenses">
        <div class="tg-title">
            <i class="fas fa-calendar-check"></i>
            <h1>Свадебный бюджет</h1>
            <span class="section-summary" id="expensesSummary"></span>
        </div>
        <div style="display: flex; align-items: center; gap: 12px;">
            <div class="tg-badge">Ответственные</div>
            <i class="fas fa-chevron-down collapse-icon"></i>
        </div>
    </div>
    <div class="section-content"></div>
</div>

<!-- ==================== СЕКЦИЯ: ГОСТИ ==================== -->
<div class="tg-container collapsed" id="guestsContainer">
    <div class="tg-header" data-section="guests">
        <div class="tg-title">
            <i class="fas fa-users"></i>
            <h1>Список гостей</h1>
            <span class="section-summary" id="guestsSummary"></span>
        </div>
        <div style="display: flex; align-items: center; gap: 12px;">
            <div class="tg-badge" id="totalGuestsBadge">Всего: 0</div>
            <i class="fas fa-chevron-down collapse-icon"></i>
        </div>
    </div>
    <div class="section-content"></div>
</div>

<!-- ==================== СЕКЦИЯ: РАССАДКА ==================== -->
<div class="tg-container collapsed" id="seatingContainer">
    <div class="tg-header" data-section="seating">
        <div class="tg-title">
            <i class="fas fa-chair"></i>
            <h1>План рассадки</h1>
            <span class="section-summary" id="seatingSummary"></span>
        </div>
        <div style="display: flex; align-items: center; gap: 12px;">
            <div class="tg-badge" id="unseatedBadge"></div>
            <i class="fas fa-chevron-down collapse-icon"></i>
        </div>
    </div>
    <div class="section-content"></div>
</div>

<!-- ==================== МОДАЛЬНЫЕ ОКНА ==================== -->
<!-- Редактирование задачи -->
<div id="editTaskModal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><h3>Редактировать задачу</h3><button class="icon-btn" id="closeModalBtn"><i class="fas fa-times"></i></button></div>
        <div style="display: flex; flex-direction: column; gap: 16px;">
            <div class="input-group"><label>Задача</label><input type="text" id="editTaskTitle"></div>
            <div class="input-group"><label>Категория</label><select id="editTaskCategory"></select></div>
            <div class="input-group"><label>Ответственный</label><select id="editTaskResponsible"><option>Невеста</option><option>Жених</option><option>Семья</option><option>Агентство</option><option>Другое</option></select></div>
            <div class="input-group"><label>Начало</label><select id="editTaskStartMonth"></select></div>
            <div class="input-group"><label>Дедлайн</label><select id="editTaskDeadlineMonth"></select></div>
            <div class="input-group"><label>Статус</label><select id="editTaskStatus"><option value="planned">Запланировано</option><option value="progress">В работе</option><option value="done">Выполнено</option></select></div>
            <div class="input-group"><label>Комментарий</label><input type="text" id="editTaskComment"></div>
            <div><label>Промежуточные этапы (месяцы)</label><div id="editMonthCheckboxes"></div></div>
        </div>
        <div style="margin-top: 24px; display: flex; justify-content: flex-end; gap: 12px;">
            <button class="btn-tg btn-outline-tg" id="cancelEditBtn">Отмена</button>
            <button class="btn-tg" id="saveEditBtn">Сохранить</button>
        </div>
    </div>
</div>

<!-- Управление категориями -->
<div id="manageCategoriesModal" class="modal">
    <div class="modal-content" style="max-width: 700px;">
        <div class="modal-header"><h3>Управление категориями</h3><button class="icon-btn" id="closeCategoriesModalBtn"><i class="fas fa-times"></i></button></div>
        <div id="manageCategoriesList" style="max-height: 400px; overflow-y: auto;"></div>
        <div style="margin-top: 20px;"><button class="btn-tg btn-outline-tg" id="closeCategoriesBtn">Закрыть</button></div>
    </div>
</div>

<!-- Редактирование гостя -->
<div id="editGuestModal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><h3>Редактировать гостя</h3><button class="icon-btn" id="closeGuestModalBtn"><i class="fas fa-times"></i></button></div>
        <div id="editGuestForm" style="display:flex; flex-wrap:wrap; gap:12px;"></div>
        <div style="margin-top:20px; display:flex; justify-content:flex-end; gap:12px;">
            <button class="btn-tg btn-outline-tg" id="cancelGuestEditBtn">Отмена</button>
            <button class="btn-tg" id="saveGuestEditBtn">Сохранить</button>
        </div>
    </div>
</div>

<!-- Редактирование расхода -->
<div id="editExpenseModal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><h3>Редактировать расход</h3><button class="icon-btn" id="closeExpenseModalBtn"><i class="fas fa-times"></i></button></div>
        <div id="editExpenseForm"></div>
        <div style="margin-top:20px; display:flex; justify-content:flex-end; gap:12px;">
            <button class="btn-tg btn-outline-tg" id="cancelExpenseEditBtn">Отмена</button>
            <button class="btn-tg" id="saveExpenseEditBtn">Сохранить</button>
        </div>
    </div>
</div>

<!-- Настройки стола -->
<div id="tableSettingsModal" class="modal">
    <div class="modal-content" style="max-width:400px;">
        <div class="modal-header"><h3>Настройки стола</h3><button class="icon-btn" id="closeTableSettingsModalBtn"><i class="fas fa-times"></i></button></div>
        <div class="input-group"><label>Номер</label><input type="text" id="tableSettingsNumber" readonly></div>
        <div class="input-group"><label>Вместимость</label><input type="number" id="tableSettingsDefaultCapacity" min="1"></div>
        <div style="margin-top:20px; display:flex; justify-content:flex-end; gap:12px;">
            <button class="btn-tg btn-outline-tg" id="cancelTableSettingsBtn">Отмена</button>
            <button class="btn-tg" id="saveTableSettingsBtn">Сохранить</button>
        </div>
    </div>
</div>

<!-- Пересадить гостя -->
<div id="changeTableModal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><h3>Пересадить</h3><button class="icon-btn" id="closeTableModalBtn"><i class="fas fa-times"></i></button></div>
        <div class="input-group"><label>Новый стол</label><select id="newTableSelect"></select></div>
        <div style="margin-top:20px; display:flex; justify-content:flex-end; gap:12px;">
            <button class="btn-tg btn-outline-tg" id="cancelTableBtn">Отмена</button>
            <button class="btn-tg" id="saveTableBtn">Пересадить</button>
        </div>
    </div>
</div>

<!-- Подтверждение удаления -->
<div id="confirmDeleteModal" class="modal">
    <div class="modal-content" style="max-width:400px;">
        <div class="modal-header"><h3>Подтверждение</h3><button class="icon-btn" id="closeConfirmModalBtn"><i class="fas fa-times"></i></button></div>
        <p id="confirmDeleteMessage"></p>
        <div style="margin-top:20px; display:flex; justify-content:flex-end; gap:12px;">
            <button class="btn-tg btn-outline-tg" id="cancelConfirmBtn">Отмена</button>
            <button class="btn-tg" id="confirmDeleteBtn" style="background:#e06c6c;">Удалить</button>
        </div>
    </div>
</div>

<!-- Основной скрипт приложения (модули подключаются внутри) -->
<script type="module" src="js/app.js"></script>
</body>
</html>
